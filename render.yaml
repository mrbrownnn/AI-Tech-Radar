services:
  - type: web
    name: ai-tech-radar
    runtime: docker
    repo: https://github.com/mrbrownnn/AI_daily_news
    branch: main
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: uvicorn src.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-tech-radar-db
          property: connectionString
      - key: PORT
        value: "8000"
      - key: APP_TIMEZONE
        value: Asia/Bangkok
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: ENABLE_REALTIME_UPDATES
        value: "true"
      - key: REALTIME_REFRESH_INTERVAL_MINUTES
        value: "15"
      - key: DIGEST_TIME_LOCAL
        value: "08:05"
      - key: DELIVERY_TIME_LOCAL
        value: "08:06"
      - key: TOP_N_ITEMS
        value: "5"
      - key: DIGEST_LANGUAGE
        value: en
      - key: ENABLE_TELEGRAM_COMMANDS
        value: "true"
      - key: EXPORT_MARKDOWN_REPORTS
        value: "false"
      - key: MARKDOWN_REPORTS_DIR
        value: reports
      - key: GITHUB_TOKEN
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

databases:
  - name: ai-tech-radar-db
    databaseName: ai_tech_radar
    user: ai_tech_radar
    plan: basic-256mb
    region: singapore

